<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0c12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Veridia">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Veridia Legends</title>
<style>
:root{
 --bg:#0a0c12; --glass:rgba(16,22,32,.72); --glass2:rgba(22,30,42,.85);
 --line:rgba(232,196,58,.45); --gold:#e8c43a; --ink:#eef0ec; --sub:#9fb2a6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
textarea,input{user-select:text;-webkit-user-select:text}
html,body{height:100%;background:var(--bg)}
body{display:flex;align-items:stretch;justify-content:center;overscroll-behavior:none;touch-action:manipulation;
 font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
 padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#shell{width:min(100vw,520px);height:100%;display:flex;flex-direction:column;gap:8px;padding:8px 8px 6px}
/* ---- screen ---- */
#screenwrap{position:relative;width:100%;aspect-ratio:5/4;background:#100c18;border-radius:16px;overflow:hidden;
 box-shadow:0 0 0 1px rgba(232,196,58,.3),0 12px 40px rgba(0,0,0,.65)}
canvas#screen{position:absolute;inset:0;width:100%;height:100%}
#mapname{position:absolute;top:10px;left:10px;background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
 color:var(--ink);font-size:12px;font-weight:600;letter-spacing:.08em;padding:5px 12px;border-radius:99px;
 border:1px solid rgba(255,255,255,.12);pointer-events:none;z-index:3}
/* ---- dialog ---- */
#dlg{display:none;position:absolute;left:8px;right:8px;bottom:8px;background:var(--glass2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
 border:1px solid var(--line);border-radius:14px;color:var(--ink);padding:13px 15px;font-size:14px;line-height:1.55;z-index:8;min-height:64px;white-space:pre-line}
#dlg .dlgmore{position:absolute;right:11px;bottom:6px;color:var(--gold);animation:bob 1s infinite}
@keyframes bob{50%{transform:translateY(2px)}}
.choicebox{display:flex;flex-direction:column;gap:7px}
.choicebox button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);color:var(--ink);font:inherit;font-size:14px;padding:10px 12px;border-radius:10px;text-align:left}
.choicebox button:active{background:rgba(232,196,58,.25)}
/* ---- panel ---- */
#panel{display:none;position:absolute;inset:8px;background:var(--glass2);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
 border:1px solid var(--line);border-radius:16px;color:var(--ink);z-index:9;flex-direction:column;padding:12px}
#panel .ptitle{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--gold);padding:2px 4px 10px;text-transform:uppercase}
#panel .plist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;touch-action:pan-y}
#panel .pitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
 color:var(--ink);font:inherit;font-size:14px;padding:10px 12px;border-radius:11px;text-align:left}
#panel .pitem:disabled{opacity:.4}
#panel .pitem:active{background:rgba(232,196,58,.22)}
#panel .pmain{flex:1;font-weight:600}
#panel .psub{font-size:11px;color:var(--sub)}
#panel .picon{width:28px;height:28px;image-rendering:pixelated;flex:none}
#panel .pback,#bmoves .backbtn{margin-top:8px;background:rgba(232,196,58,.14);border:1px solid var(--line);color:var(--gold);
 font:inherit;font-size:12px;font-weight:700;letter-spacing:.12em;padding:11px;border-radius:11px}
/* ---- battle ---- */
#battle{display:none;position:absolute;inset:0;background:linear-gradient(#9ecdea 55%,#cfe6b0 55%);z-index:7;flex-direction:column}
#bfoename{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;letter-spacing:.1em;color:#1c2830;
 background:rgba(255,255,255,.78);backdrop-filter:blur(6px);padding:4px 14px;border-radius:99px;z-index:2}
#bfield{flex:1;position:relative}
#foespr{position:absolute;right:8%;top:11%}
#allyspr{position:absolute;left:7%;bottom:3%}
#foespr canvas,#allyspr canvas{width:118px;height:118px;image-rendering:pixelated;filter:drop-shadow(0 5px 4px rgba(0,0,0,.28))}
.plat{position:absolute;width:148px;height:38px;border-radius:50%;background:rgba(0,0,0,.16);filter:blur(1px)}
#foeplat{right:4%;top:calc(11% + 86px)}
#allyplat{left:3%;bottom:0%}
.bpanel{position:absolute;background:var(--glass2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
 border:1px solid var(--line);border-radius:13px;color:var(--ink);padding:8px 11px;width:47%;min-width:160px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
#foepanel{left:3.5%;top:8%}
#allypanel{right:3.5%;bottom:5%}
.bpname{font-size:13px;font-weight:700;display:flex;justify-content:space-between;gap:6px;margin-bottom:5px}
.bplv{color:var(--gold);font-weight:700}
.stat-tag{font-size:10px;background:#7a44a0;padding:1px 6px;border-radius:99px;font-weight:600}
.hpwrap{height:8px;background:rgba(0,0,0,.45);border-radius:99px;overflow:hidden}
.hpfill{height:100%;border-radius:99px;transition:width .6s ease}
.bphp{font-size:10px;color:var(--sub);text-align:right;margin-top:3px;font-variant-numeric:tabular-nums}
.xpwrap{height:4px;background:rgba(0,0,0,.45);border-radius:99px;margin-top:4px;overflow:hidden}
.xpfill{height:100%;background:linear-gradient(90deg,#4aa2e8,#7ac4ff);border-radius:99px}
#btext{display:none;background:var(--glass2);backdrop-filter:blur(12px);border-top:1px solid var(--line);color:var(--ink);
 min-height:64px;padding:13px 15px;font-size:14px;line-height:1.5}
#btext.blink::after{content:' \25BC';color:var(--gold)}
#bmenu{display:none;grid-template-columns:1fr 1fr 1fr;grid-template-areas:'f f f' 'b p r';gap:6px;
 background:rgba(10,14,20,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px;min-height:64px}
#bmenu button{font:inherit;color:#fff;font-weight:800;letter-spacing:.14em;border-radius:12px;padding:11px 6px;
 border:1px solid rgba(0,0,0,.45);box-shadow:inset 0 2px 0 rgba(255,255,255,.28),inset 0 -3px 0 rgba(0,0,0,.28),0 3px 8px rgba(0,0,0,.3);
 text-shadow:0 1px 2px rgba(0,0,0,.45)}
#bmenu button:nth-child(1){grid-area:f;background:linear-gradient(#f08054,#c2452e);font-size:16px;letter-spacing:.3em}
#bmenu button:nth-child(2){grid-area:b;background:linear-gradient(#ecc454,#b8902a);font-size:11px}
#bmenu button:nth-child(3){grid-area:p;background:linear-gradient(#72c468,#3e8c44);font-size:11px}
#bmenu button:nth-child(4){grid-area:r;background:linear-gradient(#5ea2e6,#3a6ab0);font-size:11px}
#bmenu button:active{transform:translateY(1px);box-shadow:inset 0 2px 5px rgba(0,0,0,.45)}
#bmoves{display:none;grid-template-columns:1fr 1fr;gap:6px;background:rgba(10,14,20,.92);backdrop-filter:blur(12px);
 border-top:1px solid var(--line);padding:8px;min-height:64px}
#bmoves button{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--ink);font:inherit;font-size:13px;font-weight:600;
 padding:10px;border-radius:11px;display:flex;justify-content:space-between;align-items:center;gap:6px}
#bmoves button:active{background:rgba(232,196,58,.22)}
#bmoves button:disabled{opacity:.4}
#bmoves small{font-size:10px;font-weight:700}
#bmoves .backbtn{grid-column:1/-1;margin-top:0}
/* ---- battle fx ---- */
#fxflash{position:absolute;inset:0;z-index:12;pointer-events:none;opacity:0;background:#000}
#fxflash.go{animation:bflash .56s steps(1) forwards}
@keyframes bflash{0%{opacity:0}12%{opacity:1;background:#fff}25%{opacity:0}37%{opacity:1;background:#000}50%{opacity:0}62%{opacity:1;background:#fff}78%{opacity:1;background:#000}100%{opacity:1;background:#000}}
#foespr.enterR{animation:enterR .44s ease-out}
@keyframes enterR{from{transform:translateX(150px);opacity:0}to{transform:none;opacity:1}}
.popOut{animation:popOut .42s cubic-bezier(.2,1.5,.4,1)}
@keyframes popOut{from{transform:scale(0);opacity:0}55%{opacity:1}to{transform:none}}
.lungeA{animation:lungeA .24s ease-out}
@keyframes lungeA{30%{transform:translate(17px,-11px)}100%{transform:none}}
.lungeF{animation:lungeF .24s ease-out}
@keyframes lungeF{30%{transform:translate(-17px,11px)}100%{transform:none}}
.hitflash{animation:hitfl .38s steps(1)}
@keyframes hitfl{0%,40%,80%{opacity:.15}20%,60%,100%{opacity:1}}
.faintDrop{animation:faintDrop .46s ease-in forwards}
@keyframes faintDrop{to{transform:translateY(56px);opacity:0}}
.catchShrink{animation:catchShrink .4s ease-in forwards}
@keyframes catchShrink{to{transform:translateY(-20px) scale(.07);opacity:.85}}
.popBack{animation:popBack .28s ease-out}
@keyframes popBack{from{transform:scale(.07);opacity:.4}to{transform:none;opacity:1}}
/* ---- title ---- */
#title{display:none;position:absolute;inset:0;background:radial-gradient(ellipse at 50% 28%,#21442e,#0a0c12 78%);z-index:10;
 flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--ink)}
#title h1{font-size:34px;font-weight:900;letter-spacing:.22em;text-align:center;line-height:1.25;
 background:linear-gradient(#f6e09a,#c9982c);-webkit-background-clip:text;background-clip:text;color:transparent;
 filter:drop-shadow(0 3px 8px rgba(232,196,58,.35))}
#title .sub{font-size:11px;font-weight:700;letter-spacing:.4em;color:var(--sub)}
#titlebtns{display:flex;flex-direction:column;gap:9px;width:74%}
#titlebtns button{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:14px;font-weight:700;
 letter-spacing:.06em;padding:13px;border-radius:13px;backdrop-filter:blur(8px)}
#titlebtns button:active{background:rgba(232,196,58,.25)}
#nameinput{display:none;width:74%;background:rgba(0,0,0,.4);border:1px solid var(--line);color:var(--ink);font:inherit;font-size:15px;
 padding:11px;border-radius:13px;text-align:center}
#title .hint{font-size:10px;color:#5c6e62;letter-spacing:.14em}
/* ---- controls ---- */
#controls{flex:1;display:flex;align-items:center;justify-content:space-between;padding:4px 14px;min-height:158px;
 background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
 border:1px solid rgba(255,255,255,.09);border-radius:18px}
#dpad{position:relative;width:132px;height:132px;touch-action:none}
.dbtn{position:absolute;touch-action:none;width:44px;height:44px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);
 color:#cfe0d4;font-size:14px;display:flex;align-items:center;justify-content:center}
.dbtn.on{background:rgba(232,196,58,.4);transform:scale(.95)}
.dbtn[data-dir=up]{left:44px;top:0;border-radius:12px 12px 4px 4px}
.dbtn[data-dir=down]{left:44px;bottom:0;border-radius:4px 4px 12px 12px}
.dbtn[data-dir=left]{left:0;top:44px;border-radius:12px 4px 4px 12px}
.dbtn[data-dir=right]{right:0;top:44px;border-radius:4px 12px 12px 4px}
#dpad .hub{position:absolute;left:44px;top:44px;width:44px;height:44px;background:rgba(255,255,255,.06)}
#btnStart{touch-action:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:var(--sub);
 font:inherit;font-size:10px;font-weight:800;letter-spacing:.3em;padding:9px 20px;border-radius:99px}
#btnStart:active{background:rgba(232,196,58,.3);color:var(--ink)}
#abwrap{display:flex;align-items:center}
#ab{display:flex;gap:16px;transform:rotate(-12deg)}
.rbtn{touch-action:none;width:62px;height:62px;border-radius:50%;color:#241c08;font:inherit;font-weight:900;font-size:18px;
 background:radial-gradient(circle at 34% 28%,#f4dc94,#c9982c);border:1px solid rgba(0,0,0,.4);
 box-shadow:0 5px 0 #6e5418,0 8px 16px rgba(0,0,0,.4)}
.rbtn:active{transform:translateY(4px);box-shadow:0 1px 0 #6e5418}
#btnB{margin-top:26px}
@media (max-height:700px){#controls{min-height:132px}#dpad{width:114px;height:114px}.dbtn{width:38px;height:38px}
 .dbtn[data-dir=up],.dbtn[data-dir=down]{left:38px}.dbtn[data-dir=left],.dbtn[data-dir=right]{top:38px}
 #dpad .hub{left:38px;top:38px;width:38px;height:38px}.rbtn{width:54px;height:54px;font-size:16px}}
</style>
</head>
<body>
<div id="shell">
 <div id="screenwrap">
  <canvas id="screen" width="720" height="576"></canvas>
  <div id="mapname"></div>
  <div id="battle">
   <div id="bfoename"></div>
   <div id="bfield">
    <div id="foeplat" class="plat"></div>
    <div id="allyplat" class="plat"></div>
    <div id="foepanel" class="bpanel"></div>
    <div id="foespr"></div>
    <div id="allyspr"></div>
    <div id="allypanel" class="bpanel"></div>
   </div>
   <div id="btext"></div>
   <div id="bmenu">
    <button>FIGHT</button><button>BAG</button><button>BEASTS</button><button>RUN</button>
   </div>
   <div id="bmoves"></div>
  </div>
  <div id="panel"></div>
  <div id="dlg"></div>
  <div id="fxflash"></div>
  <div id="title">
   <h1>VERIDIA<br>LEGENDS</h1>
   <div class="sub">103 BEASTS &middot; 18 TYPES &middot; 9 BIOMES</div>
   <input id="nameinput" maxlength="10" placeholder="Enter your name" autocomplete="off">
   <div id="titlebtns"></div>
   <div class="hint">D-PAD WALK &middot; A TALK &middot; B RUN/BACK &middot; START MENU</div>
  </div>
 </div>
 <div id="controls">
  <div id="dpad">
   <button class="dbtn" data-dir="up">&#9650;</button>
   <button class="dbtn" data-dir="left">&#9664;</button>
   <div class="hub"></div>
   <button class="dbtn" data-dir="right">&#9654;</button>
   <button class="dbtn" data-dir="down">&#9660;</button>
  </div>
  <button id="btnStart">START</button>
  <div id="abwrap">
   <div id="ab">
    <button class="rbtn" id="btnB">B</button>
    <button class="rbtn" id="btnA">A</button>
   </div>
  </div>
 </div>
</div>
<script>
/* ============================================================
   VERIDIA LEGENDS — an original monster-taming RPG
   All creatures, names, characters and region are original.
   ============================================================ */
'use strict';

/* ---------- utils ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function rint(rng,a,b){return a+Math.floor(rng()*(b-a+1))}
function pick(rng,arr){return arr[Math.floor(rng()*arr.length)]}
function clamp(v,a,b){return v<a?a:v>b?b:v}

/* ---------- types ---------- */
const TYPE_COLORS={Normal:'#9aa07a',Fire:'#e8703a',Water:'#5a8fd8',Grass:'#6ab84f',Electric:'#e8c43a',Ice:'#8fd0d0',Fighting:'#b04438',Poison:'#9a52a8',Ground:'#cfa860',Flying:'#9a90d8',Psychic:'#e06090',Bug:'#9aa832',Rock:'#a89048',Ghost:'#705898',Dragon:'#6a50c8',Dark:'#5a4a42',Steel:'#9aa0b8',Fairy:'#e8a0c8'};
const CHART={
 Normal:{Rock:.5,Steel:.5,Ghost:0},
 Fire:{Grass:2,Ice:2,Bug:2,Steel:2,Fire:.5,Water:.5,Rock:.5,Dragon:.5},
 Water:{Fire:2,Ground:2,Rock:2,Water:.5,Grass:.5,Dragon:.5},
 Grass:{Water:2,Ground:2,Rock:2,Fire:.5,Grass:.5,Poison:.5,Flying:.5,Bug:.5,Dragon:.5,Steel:.5},
 Electric:{Water:2,Flying:2,Electric:.5,Grass:.5,Dragon:.5,Ground:0},
 Ice:{Grass:2,Ground:2,Flying:2,Dragon:2,Fire:.5,Water:.5,Ice:.5,Steel:.5},
 Fighting:{Normal:2,Ice:2,Rock:2,Dark:2,Steel:2,Poison:.5,Flying:.5,Psychic:.5,Bug:.5,Fairy:.5,Ghost:0},
 Poison:{Grass:2,Fairy:2,Poison:.5,Ground:.5,Rock:.5,Ghost:.5,Steel:0},
 Ground:{Fire:2,Electric:2,Poison:2,Rock:2,Steel:2,Grass:.5,Bug:.5,Flying:0},
 Flying:{Grass:2,Fighting:2,Bug:2,Electric:.5,Rock:.5,Steel:.5},
 Psychic:{Fighting:2,Poison:2,Psychic:.5,Steel:.5,Dark:0},
 Bug:{Grass:2,Psychic:2,Dark:2,Fire:.5,Fighting:.5,Poison:.5,Flying:.5,Ghost:.5,Steel:.5,Fairy:.5},
 Rock:{Fire:2,Ice:2,Flying:2,Bug:2,Fighting:.5,Ground:.5,Steel:.5},
 Ghost:{Psychic:2,Ghost:2,Dark:.5,Normal:0},
 Dragon:{Dragon:2,Steel:.5,Fairy:0},
 Dark:{Psychic:2,Ghost:2,Fighting:.5,Dark:.5,Fairy:.5},
 Steel:{Ice:2,Rock:2,Fairy:2,Fire:.5,Water:.5,Electric:.5,Steel:.5},
 Fairy:{Fighting:2,Dragon:2,Dark:2,Fire:.5,Poison:.5,Steel:.5}
};
function effMult(mt,defTypes){let m=1;for(const t of defTypes){const row=CHART[mt];if(row&&row[t]!==undefined)m*=row[t];}return m}

/* ---------- moves ----------
   n name, t type, c category P/S/X, p power, a accuracy, pp,
   prio, st:[status,chance%], chg:[[stat,delta,'self'|'foe']], heal, drain */
const MOVES={
 tackle:{n:'Tackle',t:'Normal',c:'P',p:40,a:100,pp:35},
 scratch:{n:'Scratch',t:'Normal',c:'P',p:40,a:100,pp:35},
 quickstrike:{n:'Quick Strike',t:'Normal',c:'P',p:40,a:100,pp:30,prio:1},
 slam:{n:'Slam',t:'Normal',c:'P',p:80,a:75,pp:20},
 hyperrush:{n:'Hyper Rush',t:'Normal',c:'P',p:90,a:90,pp:15},
 growl:{n:'Growl',t:'Normal',c:'X',a:100,pp:40,chg:[['atk',-1,'foe']]},
 harden:{n:'Harden',t:'Normal',c:'X',pp:30,chg:[['def',1,'self']]},
 screech:{n:'Screech',t:'Normal',c:'X',a:85,pp:20,chg:[['def',-2,'foe']]},
 mend:{n:'Mend',t:'Normal',c:'X',pp:10,heal:.5},
 ember:{n:'Ember',t:'Fire',c:'S',p:40,a:100,pp:25,st:['BRN',10]},
 flamerush:{n:'Flame Rush',t:'Fire',c:'P',p:70,a:100,pp:20,st:['BRN',10]},
 blazeburst:{n:'Blaze Burst',t:'Fire',c:'S',p:95,a:100,pp:10,st:['BRN',10]},
 tidaljab:{n:'Tidal Jab',t:'Water',c:'P',p:40,a:100,pp:25,prio:1},
 hydropulse:{n:'Hydro Pulse',t:'Water',c:'S',p:60,a:100,pp:20},
 tidalwave:{n:'Tidal Wave',t:'Water',c:'S',p:90,a:100,pp:12},
 hydroburst:{n:'Hydro Burst',t:'Water',c:'S',p:110,a:80,pp:5},
 vinelash:{n:'Vine Lash',t:'Grass',c:'P',p:45,a:100,pp:25},
 leafcutter:{n:'Leaf Cutter',t:'Grass',c:'P',p:60,a:95,pp:20},
 petalstorm:{n:'Petal Storm',t:'Grass',c:'S',p:90,a:100,pp:12},
 sleepspore:{n:'Sleep Spore',t:'Grass',c:'X',a:75,pp:15,st:['SLP',100]},
 leechdrain:{n:'Leech Drain',t:'Grass',c:'S',p:45,a:100,pp:20,drain:.5},
 spark:{n:'Spark',t:'Electric',c:'S',p:40,a:100,pp:25,st:['PAR',10]},
 voltlash:{n:'Volt Lash',t:'Electric',c:'P',p:65,a:100,pp:20,st:['PAR',10]},
 thundercrash:{n:'Thunder Crash',t:'Electric',c:'S',p:95,a:100,pp:10,st:['PAR',10]},
 staticwave:{n:'Static Wave',t:'Electric',c:'X',a:90,pp:20,st:['PAR',100]},
 frostnip:{n:'Frost Nip',t:'Ice',c:'S',p:40,a:100,pp:25,st:['FRZ',10]},
 icelance:{n:'Ice Lance',t:'Ice',c:'P',p:65,a:100,pp:20},
 glacialstorm:{n:'Glacial Storm',t:'Ice',c:'S',p:110,a:70,pp:5,st:['FRZ',10]},
 jab:{n:'Jab',t:'Fighting',c:'P',p:45,a:100,pp:25},
 powerkick:{n:'Power Kick',t:'Fighting',c:'P',p:75,a:100,pp:15},
 titanfist:{n:'Titan Fist',t:'Fighting',c:'P',p:100,a:85,pp:8},
 train:{n:'Train',t:'Fighting',c:'X',pp:20,chg:[['atk',1,'self'],['def',1,'self']]},
 toxicsting:{n:'Toxic Sting',t:'Poison',c:'P',p:40,a:100,pp:25,st:['PSN',20]},
 venomblast:{n:'Venom Blast',t:'Poison',c:'S',p:85,a:100,pp:10,st:['PSN',30]},

const WORLD={}; // id -> map

function blank(w,h,fill){const g=[];for(let y=0;y<h;y++){g.push(new Array(w).fill(fill));}return g}
function rect(g,x,y,w,h,ch){for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++){if(g[j]&&g[j][i]!==undefined)g[j][i]=ch;}}
function putBuilding(g,x,y,w,h){ // roof 2 rows + wall, door bottom-center; returns door pos
 rect(g,x,y,w,2,'r');rect(g,x,y+2,w,h-2,'b');
 const dx=x+Math.floor(w/2),dy=y+h-1;g[dy][dx]='D';return{x:dx,y:dy};
}

/* ----- routes ----- */
function makeRoute(idx,cfg){
 const id='r'+idx,W2=13,H=28,rng=mulberry32(2000+idx);
 const g=blank(W2,H,'.');
 rect(g,0,0,1,H,'T');rect(g,W2-1,0,1,H,'T');
 if(!cfg.n)rect(g,0,0,W2,1,'T');
 if(!cfg.s)rect(g,0,H-1,W2,1,'T');
 // meandering path
 let x=6;const pathX=[];
 for(let y=H-1;y>=0;y--){
  pathX[y]=x;g[y][x]='-';if(x>1)g[y][x-1]='-';
  if(y%3===0&&y>2&&y<H-3){x=clamp(x+rint(rng,-1,1),3,W2-4);}
 }
 // grass patches
 for(let i=0;i<7;i++){
  const gx=rint(rng,2,W2-5),gy=rint(rng,2,H-5),gw=rint(rng,2,3),gh=rint(rng,2,3);
  for(let j=gy;j<gy+gh;j++)for(let k=gx;k<gx+gw;k++){if(g[j][k]==='.')g[j][k]='G';}
 }
 // force grass over part of the path so encounters can't be skipped
 for(const fy of cfg.forceGrass||[Math.floor(H*0.35),Math.floor(H*0.65)]){
  for(let j=fy;j<fy+2;j++){for(let k=1;k<W2-1;k++){if(!SOLID[g[j][k]])g[j][k]='G';}}
 }
 // scattered trees/rocks off-path
 for(let i=0;i<9;i++){
  const tx=rint(rng,2,W2-3),ty=rint(rng,2,H-3);
  if(g[ty][tx]==='.'&&Math.abs(tx-pathX[ty])>1)g[ty][tx]=pick(rng,['T','T','R']);
 }
 const m={id,grid:g,name:cfg.name,enc:cfg.enc,npcs:[],warps:{},exits:{n:cfg.n,s:cfg.s},signs:{}};
 // sign
 const sy=H-3;g[sy][pathX[sy]+2]='S';m.signs[wk(pathX[sy]+2,sy)]=cfg.name;
 // trainers stand beside the path facing across it
 (cfg.trainers||[]).forEach((tr,i,arr)=>{
  const at=tr.at!==undefined?tr.at:(arr.length===1?0.5:0.3+i*(0.45/(arr.length-1)));
  const ty=clamp(Math.floor(H*at),2,H-3);const px=pathX[ty];
  const side=(i%2===0)?1:-1;let tx=px+2*side;tx=clamp(tx,1,W2-2);
  g[ty][tx]='.';g[ty][px+side]= SOLID[g[ty][px+side]]?'.':g[ty][px+side];
  m.npcs.push({x:tx,y:ty,kind:'trainer',pal:tr.pal??2,face:side===1?'left':'right',range:3,trainer:tr});
 });
 (cfg.extras||[]).forEach(n=>{if(n.at!==undefined){const ty=clamp(Math.floor(H*n.at),2,H-3);n.x=pathX[ty];n.y=ty;}m.npcs.push(n)});
 m.ground='.';
 return finishMap(m);
}

function tileAt(m,x,y){if(x<0||y<0||x>=m.w||y>=m.h)return m.oob||'T';return m.grid[y][x]}
function npcAt(m,x,y){return m.npcs.find(n=>n.x===x&&n.y===y&&!npcGone(n))}
function npcGone(n){
 if(n.kind==='guard')return G.badges>n.gate;
 if(n.kind==='rival')return G.flags['rival'+n.stage];
 if(n.kind==='legend')return!G.flags.champion||G.flags[n.leg.flag];
 if(n.kind==='spire')return!G.flags.champion;
 if(n.kind==='item')return!!G.flags[n.flag];
 return false;
}
function solidAt(m,x,y){
 const t=tileAt(m,x,y);
 if(SOLID[t])return true;

}
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};

function tryStep(dir){
 if(player.moving||busy)return;
 if(G.facing!==dir){G.facing=dir;player.faceT=performance.now();return}
 if(performance.now()-(player.faceT||0)<70)return;
 const[dx,dy]=DIRS[dir];const m=curMap();
 const nx=G.x+dx,ny=G.y+dy;
 // edge exits
 if(nx<0||ny<0||nx>=m.w||ny>=m.h){
  const side=ny<0?'n':ny>=m.h?'s':null;
  if(side&&m.exits[side]){gotoMap(m.exits[side],side);return}
  return;
 }
 if(solidAt(m,nx,ny))return;
 player.moving=true;player.t=0;player.fx=G.x;player.fy=G.y;
 G.x=nx;G.y=ny;player.step^=1;
}
function gotoMap(id,fromSide){
 const m=WORLD[id];G.map=id;
 if(fromSide==='n'){ // we exited north -> enter target from its south
  G.y=m.h-1;G.x=findOpen(m,m.h-2);G.facing='up';
 }else{
  G.y=0;G.x=findOpen(m,1);G.facing='down';
 }
 // ensure standing tile walkable
 if(SOLID[tileAt(m,G.x,G.y)])G.grid; // noop safe
 saveGame();
}
function findOpen(m,row){
 let best=Math.floor(m.w/2);
 for(let off=0;off<m.w;off++){for(const x of[best+off,best-off]){if(x>0&&x<m.w-1&&!SOLID[tileAt(m,x,row)]&&!SOLID[tileAt(m,x,row===1?0:m.h-1)])return x;}}
 return best;
}
async function arrived(){
 const m=curMap();
 // warp (doors / mats)
 const w=m.warps[wk(G.x,G.y)];
 if(w){
  if(w.out){ // interior exit
   const o=WORLD[w.out];
   if(w.edge){G.map=w.out;G.y=0;G.x=findOpen(o,1);G.facing='down';}
   else{
    // find this interior's door in the outside map
    let dpos=null;for(const k in o.warps){if(o.warps[k].to===m.id){const[xx,yy]=k.split(',').map(Number);dpos={x:xx,y:yy}}}
    G.map=w.out;G.x=dpos?dpos.x:2;G.y=dpos?dpos.y+1:2;G.facing='down';
   }
  }else{G.map=w.to;G.x=w.x;G.y=w.y;G.facing='up';}
  saveGame();return;
 }
 // trainer line-of-sight
 for(const n of m.npcs){
  if(n.kind!=='trainer'&&n.kind!=='rival')continue;
  if(npcGone(n))continue;
  if(n.trainer&&G.flags[n.trainer.flag])continue;
  const[dx,dy]=DIRS[n.face||'down'];
  for(let d=1;d<=(n.range||3);d++){
   const sx=n.x+dx*d,sy=n.y+dy*d;
   if(SOLID[tileAt(m,sx,sy)])break;
   if(sx===G.x&&sy===G.y){await trainerSpotted(n);return}
  }
 }
 // wild encounters by terrain
 const _et=ENC_TILES[tileAt(m,G.x,G.y)];
 if(_et&&m.enc&&Math.random()<_et){
  await wildEncounter(m.enc);
 }
}

async function interact(){
 if(busy||player.moving)return;
 const m=curMap();const[dx,dy]=DIRS[G.facing];
 let tx=G.x+dx,ty=G.y+dy;
 // counters: talk across them
 if(tileAt(m,tx,ty)==='C'){tx+=dx;ty+=dy}
 const sign=m.signs&&m.signs[wk(G.x+dx,G.y+dy)];
 if(sign){busy=true;await showText(sign);busy=false;return}
 const n=npcAt(m,tx,ty)||m.npcs.find(nn=>nn.x===tx&&nn.y===ty&&!npcGone(nn));
 if(!n)return;
 busy=true;
 n.faceTo=G.facing==='up'?'down':G.facing==='down'?'up':G.facing==='left'?'right':'left';
 try{
  if(n.kind==='npc'||n.kind==='guard'){
   await showText(n.kind==='guard'&&G.badges>n.gate?n.openDialog:n.dialog);
  }
  else if(n.kind==='item'){
   G.bag[n.item]=(G.bag[n.item]||0)+1;G.flags[n.flag]=true;
   await showText('You found a '+ITEMS[n.item].n+'!');saveGame();
  }
  else if(n.kind==='nurse')await nurseHeal();
  else if(n.kind==='pc')await pcMenu();
  else if(n.kind==='shop')await shopMenu();
  else if(n.kind==='prof')await professor();
  else if(n.kind==='leader')await gymLeader(n.gym);
  else if(n.kind==='trainer'){
   if(G.flags[n.trainer.flag])await showText(n.trainer.name+': '+n.trainer.win);
   else{await showText(n.trainer.pre);
    const res=await battle({kind:'trainer',name:n.trainer.name,team:n.trainer.team.map(([s,l])=>makeMon(s,l)),prize:n.trainer.prize,winText:n.trainer.win});
    if(res.win){G.flags[n.trainer.flag]=true;saveGame()}}
  }
  else if(n.kind==='rival')await rivalBattle(n);
  else if(n.kind==='legend')await legendBattle(n);
  else if(n.kind==='league')await leagueChallenge();
  else if(n.kind==='spire')await battleSpire();
 }finally{busy=false}
}

function composite(m){

  vignette(SW,SH);return;
 }
 const Hb=bcv.height;
 for(let y=0;y<SH;y+=2){
  const t=y/(SH-2);
  const proj=(PSP*t)/(1+(PSP-1)*t);
  const srcY=proj*(Hb-6);
  const srcW=clamp(SW*(PSP-(PSP-1)*1.7*t),SW*0.85,bcv.width-1);
  ctx.drawImage(bcv,(bcv.width-srcW)/2,srcY,srcW,5,0,y,SW,2);
 }
 vignette(SW,SH);
}

 }
 ctx.drawImage(vigCache,0,0);
}

let AC=null;
function sfx(kind){
 if(!G||G.sfx===false||typeof window==='undefined')return;
 try{
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  const P={blip:[520,.045,'square',.035],sel:[660,.05,'square',.045],hit:[150,.1,'sawtooth',.09],
   faint:[300,.32,'sawtooth',.14,70],heal:[523,.14,'sine',.09,880],lvl:[523,.16,'square',.07,1046],
   throwo:[330,.12,'sine',.06,720]}[kind]||[440,.05,'square',.04];
  const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=P[2];o.frequency.setValueAtTime(P[0],t);
  if(P[4])o.frequency.linearRampToValueAtTime(P[4],t+P[1]);
  g.gain.setValueAtTime(P[3],t);g.gain.exponentialRampToValueAtTime(.0008,t+P[1]);
  o.start(t);o.stop(t+P[1]+.03);
 }catch(e){}
}

const MUS={
 ow:{bpm:104,bass:[36,0,43,0,41,0,43,0,36,0,43,0,45,0,43,0],
     lead:[60,64,67,72,0,67,69,67,64,62,64,67,0,64,62,60]},

     lead:[69,0,72,76,0,74,72,69,71,0,74,77,0,76,74,71]}
};
let musName=null,musTimer=null,musNext=0,musStep=0;
function midiF(n){return 440*Math.pow(2,(n-69)/12)}
function mnote(f,t,d,type,v){
 const o=AC.createOscillator(),g=AC.createGain();
 o.type=type;o.frequency.value=f;o.connect(g);g.connect(AC.destination);
 g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
 o.start(t);o.stop(t+d+.02);
}
function musTick(){
 if(!musName||!AC)return;
 const song=MUS[musName],spb=30/song.bpm;
 while(musNext<AC.currentTime+0.22){
  const i=musStep%16,b=song.bass[i],l=song.lead[i];
  if(b)mnote(midiF(b),musNext,spb*0.92,'triangle',.07);
  if(l)mnote(midiF(l),musNext,spb*0.8,'square',.04);
  musNext+=spb;musStep++;
 }
}
function setMusic(name){
 if(G&&G.music===false)name=null;
 if(name===musName)return;
 musName=name;musStep=0;
 if(name){

   if(AC.state==='suspended')AC.resume();
  }catch(e){musName=null;return}
  musNext=AC.currentTime+0.06;
  if(!musTimer)musTimer=setInterval(musTick,80);
 }else if(musTimer){clearInterval(musTimer);musTimer=null}
}

const B={on:false};
function calcDamage(att,def,mv,aSt,dSt){
 const a=mv.c==='P'?bStat(att,'atk',aSt):bStat(att,'spa',aSt);
 const d=mv.c==='P'?bStat(def,'def',dSt):bStat(def,'spd',dSt);
 let dmg=(((2*att.lv/5+2)*mv.p*a/d)/50)+2;
 const low=abilityOf(att)==='Resolve'&&att.hp<=Math.floor(mMax(att)/3);
 const stab=SPECIES[att.sp].t.includes(mv.t)?(low?1.95:1.5):1;
 const eff=effMult(mv.t,SPECIES[def.sp].t);
 const crit=Math.random()<(mv.hc?0.25:1/16)?1.5:1;
 if(att.held==='powerband'&&mv.c==='P')dmg*=1.1;
 if(att.held==='wisplens'&&mv.c==='S')dmg*=1.1;
 dmg*=stab*eff*crit*(0.85+Math.random()*0.15);
 return{dmg:Math.max(1,Math.floor(dmg)),eff,crit:crit>1};
}
function xpNeed(lv){return lv*lv*lv}
function aiPick(foe,ally){
 const usable=foe.moves.filter(m=>m.pp>0);
 if(!usable.length)return{id:'tackle',pp:1};
 let best=null,bestScore=-1;
 for(const m of usable){
  const mv=MOVES[m.id];let s;
  if(mv.c==='X')s=18+Math.random()*20;
  else s=mv.p*effMult(mv.t,SPECIES[ally.sp].t)*(SPECIES[foe.sp].t.includes(mv.t)?1.5:1)*(0.9+Math.random()*0.2);
  if(s>bestScore){bestScore=s;best=m}
 }
 return best;
}

async function applyMove(user,target,uSt,tSt,mvSlot,userName,targetName){
 const mv=MOVES[mvSlot.id];
 await bText(userName+' used '+mv.n+'!');
 if(mv.a&&Math.random()*100>mv.a){await bText('It missed!');return}
 if(mv.c==='X'){
  if(mv.heal){const max=mMax(user);const h=Math.floor(max*mv.heal);user.hp=Math.min(max,user.hp+h);await bText(userName+'\u2019s health was restored!')}
  if(mv.chg)for(const[stat,d,tg]of mv.chg){
   const st=tg==='self'?uSt:tSt;st[stat]=clamp((st[stat]||0)+d,-6,6);
   await bText((tg==='self'?userName:targetName)+'\u2019s '+{atk:'Attack',def:'Defense',spa:'Sp. Atk',spd:'Sp. Def',spe:'Speed'}[stat]+(d>0?(d>1?' rose sharply!':' rose!'):(d<-1?' fell sharply!':' fell!')));
  }
  if(mv.st&&mv.st[0]!=='FLN'&&!target.status&&Math.random()*100<mv.st[1]){
   target.status=mv.st[0];if(mv.st[0]==='SLP')target.slpT=rint(mulberry32(Date.now()&0xffff),1,3);
   await bText(targetName+' is '+STATUS_NAMES[mv.st[0]]+'!');
  }else if(mv.st&&mv.st[0]!=='FLN'&&target.status){await bText('It failed!')}
  refreshPanels();return;
 }
 const uEl=user===B.ally?'allyspr':'foespr',tEl=user===B.ally?'foespr':'allyspr';
 await fx(uEl,user===B.ally?'lungeA':'lungeF',240);
 const hits=mv.multi?mv.multi[0]+Math.floor(Math.random()*(mv.multi[1]-mv.multi[0]+1)):1;
 let total=0,anyCrit=false,eff=1,landed=0;
 for(let h=0;h<hits;h++){
  if(target.hp<=0)break;
  const r=calcDamage(user,target,mv,uSt,tSt);
  eff=r.eff;
  if(r.eff===0)break;
  target.hp=Math.max(0,target.hp-r.dmg);total+=r.dmg;landed++;
  if(r.crit)anyCrit=true;
 }
 if(eff===0){await bText('It doesn\u2019t affect '+targetName+'...');return}
 if(landed>0){sfx('hit');fx(tEl,'hitflash',380)}
 refreshPanels();
 if(hits>1)await bText('Hit '+landed+' time'+(landed===1?'':'s')+'!');
 if(anyCrit)await bText('A critical hit!');
 if(eff>1)await bText('It\u2019s super effective!');
 if(eff<1)await bText('It\u2019s not very effective...');
 if(mv.drain&&total>0){user.hp=Math.min(mMax(user),user.hp+Math.max(1,Math.floor(total*mv.drain)));refreshPanels();await bText(userName+' drained energy!')}
 if(mv.recoil&&total>0){user.hp=Math.max(0,user.hp-Math.max(1,Math.floor(total*mv.recoil)));refreshPanels();await bText(userName+' was hurt by recoil!')}
 if(target.hp>0&&target.held==='oranberry'&&target.hp<=Math.floor(mMax(target)/2)){
  target.held=null;target.hp=Math.min(mMax(target),target.hp+30);
  refreshPanels();sfx('heal');
  await bText(targetName+'\u2019s Oran Berry restored its HP!');
 }
 if(mv.st&&target.hp>0&&Math.random()*100<mv.st[1]){
  if(mv.st[0]==='FLN'){target._fln=true}
  else if(!target.status){
   target.status=mv.st[0];if(mv.st[0]==='SLP')target.slpT=2;
   refreshPanels();await bText(targetName+' is '+STATUS_NAMES[mv.st[0]]+'!');
  }
 }
}

async function gainXP(mon,foe,isTrainer,nParts){
 if(mon.hp<=0||mon.lv>=100)return;
 let xp=Math.floor(SPECIES[foe.sp].bx*foe.lv/7/Math.max(1,nParts));
 if(isTrainer)xp=Math.floor(xp*1.5);
 await bText(mName(mon)+' gained '+xp+' XP!');
 mon.xp+=xp;
 while(mon.lv<100&&mon.xp>=xpNeed(mon.lv+1)){
  const oldMax=mMax(mon);
  mon.lv++;
  mon.hp=Math.min(mMax(mon),mon.hp+(mMax(mon)-oldMax));
  refreshPanels();
  sfx('lvl');
  await bText(mName(mon)+' grew to Lv'+mon.lv+'!');
  // learn moves
  for(const[lv,id]of SPECIES[mon.sp].ls){
   if(lv!==mon.lv)continue;
   if(mon.moves.some(m=>m.id===id))continue;
   if(mon.moves.length<4){mon.moves.push({id,pp:MOVES[id].pp});await bText(mName(mon)+' learned '+MOVES[id].n+'!')}
   else{
    await bText(mName(mon)+' wants to learn '+MOVES[id].n+'! Forget a move?');
    const opts=mon.moves.map(m=>MOVES[m.id].n).concat(['Skip '+MOVES[id].n]);
    const c=await showChoice(opts);
    if(c<4){await bText('Forgot '+MOVES[mon.moves[c].id].n+' and learned '+MOVES[id].n+'!');mon.moves[c]={id,pp:MOVES[id].pp}}
   }
  }
 }
}
function pendingEvo(mon){const sp=SPECIES[mon.sp];return sp.ev&&mon.lv>=sp.ev[1]?sp.ev[0]:null}

  G.seen[to]=1;G.caught[to]=1;

function tryCatch(foe,ballMult){

 const sb=foe.status==='SLP'||foe.status==='FRZ'?2:foe.status?1.5:1;
 const chance=(cr/255)*(1-(foe.hp/mMax(foe))*2/3)*ballMult*sb;
 return Math.random()<clamp(chance,0.02,0.95);
}

/* main battle */
async function battle(opts){
 B.on=true;B.kind=opts.kind;
 B.team=opts.kind==='trainer'?opts.team:[opts.foe];
 B.fi=0;B.foe=B.team[0];
 let ai=firstAlive();if(ai<0)ai=0;
 B.ally=G.party[ai];
 B.aSt={};B.fSt={};B.parts=new Set([ai]);
 G.seen[B.foe.sp]=1;
 sfx('sel');setMusic('bt');await battleFlash();
 const ov=document.getElementById('battle');
 const g0=curMap().ground||'.';
 ov.style.background=BBG[g0]||BBG['.'];
 const PLATC={'.':'radial-gradient(rgba(96,168,84,.85),rgba(58,116,58,.35) 70%)','c':'radial-gradient(rgba(96,80,74,.9),rgba(42,34,42,.35) 70%)',
  's':'radial-gradient(rgba(224,204,144,.9),rgba(164,142,92,.35) 70%)','i':'radial-gradient(rgba(244,250,255,.95),rgba(172,202,222,.4) 70%)',
  'v':'radial-gradient(rgba(128,64,52,.9),rgba(62,32,32,.35) 70%)','m':'radial-gradient(rgba(116,106,74,.9),rgba(62,56,42,.35) 70%)',
  'f':'radial-gradient(rgba(124,134,154,.9),rgba(72,82,102,.35) 70%)'};
 const pc=PLATC[g0]||PLATC['.'];
 document.getElementById('foeplat').style.background=pc;
 document.getElementById('allyplat').style.background=pc;
 ov.style.display='flex';
 setSprites();refreshPanels();
 document.getElementById('bfoename').textContent=opts.kind==='trainer'?opts.name:'Wild '+mName(B.foe);
 if(opts.kind==='trainer')await bText(opts.name+' challenges you!');
 else await bText('A wild '+mName(B.foe)+' appeared!'+(B.foe.shiny?' \u2728 It\u2019s SHINY!':opts.legend?' \u2728':''));
 if(abilityOf(B.foe)==='Daunt'){B.aSt.atk=clamp((B.aSt.atk||0)-1,-6,6);await bText('Foe '+mName(B.foe)+'\u2019s Daunt lowered '+mName(B.ally)+'\u2019s Attack!')}
 await bText('Go, '+mName(B.ally)+'!');
 if(abilityOf(B.ally)==='Daunt'){B.fSt.atk=clamp((B.fSt.atk||0)-1,-6,6);await bText(mName(B.ally)+'\u2019s Daunt lowered the foe\u2019s Attack!')}
 let result={win:false,caught:false,ran:false};
 try{
 outer:
 while(true){
  B.ally._fln=false;if(B.foe)B.foe._fln=false;
  // player command
  let action=null; // {type:'move',i}|{type:'switch',i}|{type:'item',id,target}|{type:'run'}
  while(!action){
   const c=await bMenuPick();
   if(c===0){const mi=await bMovePick(B.ally);if(mi>=0)action={type:'move',i:mi}}
   else if(c===1){const r=await battleBag();if(r)action=r}
   else if(c===2){const si=await partyScreen(true);if(si>=0)action={type:'switch',i:si}}
   else{
    if(opts.kind==='trainer'){await bText('You can\u2019t run from a trainer battle!')}
    else action={type:'run'};
   }
  }
  // run
  if(action.type==='run'){
   const ch=clamp(.5+(bStat(B.ally,'spe',B.aSt)-bStat(B.foe,'spe',B.fSt))/Math.max(1,bStat(B.foe,'spe',B.fSt))*.3,.3,.95);
   if(Math.random()<ch){await bText('Got away safely!');result.ran=true;break}
   await bText('Couldn\u2019t escape!');
   await foeTurn();if(await checkAllyFaint())break;
   await endOfTurn();continue;
  }
  // item
  if(action.type==='item'){
   const it=ITEMS[action.id];
   G.bag[action.id]--;if(G.bag[action.id]<=0)delete G.bag[action.id];
   if(it.kind==='ball'){
    if(opts.kind==='trainer'){await bText('You can\u2019t catch another tamer\u2019s beast!')}
    else{
     await bText('You threw a '+it.n+'...');
     sfx('throwo');await fx('foespr','catchShrink',400,true);
     await delay(750);
     if(tryCatch(B.foe,it.mult)){
      sfx('lvl');
      await bText('Gotcha! '+mName(B.foe)+' was caught!');
      G.caught[B.foe.sp]=1;
      if(G.party.length<6)G.party.push(B.foe);
      else{G.box.push(B.foe);await bText(mName(B.foe)+' was sent to your storage box.')}
      result.caught=true;result.win=true;break;
     }
     await fx('foespr','popBack',280);
     document.getElementById('foespr').classList.remove('catchShrink');
     await bText('Oh no! It broke free!');
    }
   }else if(it.kind==='heal'){B.ally.hp=Math.min(mMax(B.ally),B.ally.hp+it.hp);refreshPanels();await bText(mName(B.ally)+' recovered HP!')}
   else if(it.kind==='status'){B.ally.status=null;refreshPanels();await bText(mName(B.ally)+' was cured!')}
   else if(it.kind==='revive'){/* handled in battleBag via party pick */}
   await foeTurn();if(await checkAllyFaint())break;
   await endOfTurn();continue;
  }
  // switch
  if(action.type==='switch'){
   await bText('Come back, '+mName(B.ally)+'!');
   B.ally=G.party[action.i];B.aSt={};B.parts.add(action.i);
   setSprites();refreshPanels();
   await bText('Go, '+mName(B.ally)+'!');
   if(abilityOf(B.ally)==='Daunt'){B.fSt.atk=clamp((B.fSt.atk||0)-1,-6,6);await bText(mName(B.ally)+'\u2019s Daunt lowered the foe\u2019s Attack!')}
   await foeTurn();if(await checkAllyFaint())break;
   await endOfTurn();continue;
  }
  // move vs move: order
  const pm=B.ally.moves[action.i];const fm=aiPick(B.foe,B.ally);
  const pPrio=MOVES[pm.id].prio||0,fPrio=MOVES[fm.id].prio||0;
  const pFirst=pPrio>fPrio||(pPrio===fPrio&&bStat(B.ally,'spe',B.aSt)>=bStat(B.foe,'spe',B.fSt));
  const seq=pFirst?['p','f']:['f','p'];
  for(const who of seq){
   if(who==='p'){
    if(B.ally.hp<=0)continue;
    if(B.ally._fln){await bText(mName(B.ally)+' flinched!');B.ally._fln=false;}
    else if(await preMove(B.ally,mName(B.ally))){
     pm.pp=Math.max(0,pm.pp-1);
     await applyMove(B.ally,B.foe,B.aSt,B.fSt,pm,mName(B.ally),'Foe '+mName(B.foe));
    }
    if(B.foe.hp<=0){
     if(await foeFainted(opts))break outer;
     if(await checkAllyFaint())break outer;
     continue;
    }
    if(await checkAllyFaint())break outer;
   }else{
    if(B.foe.hp<=0)continue;
    if(B.foe._fln){await bText('Foe '+mName(B.foe)+' flinched!');B.foe._fln=false;}
    else if(await preMove(B.foe,'Foe '+mName(B.foe))){
     fm.pp=Math.max(0,fm.pp-1);
     await applyMove(B.foe,B.ally,B.fSt,B.aSt,fm,'Foe '+mName(B.foe),mName(B.ally));
    }
    if(B.foe.hp<=0){
     if(await foeFainted(opts))break outer;
     continue;
    }
    if(await checkAllyFaint())break outer;
   }
  }
  await endTurnStatus(B.ally,mName(B.ally));
  if(await checkAllyFaint())break;
  await endTurnStatus(B.foe,'Foe '+mName(B.foe));
  if(B.foe.hp<=0){if(await foeFainted(opts))break}
 }
 }finally{
  document.getElementById('battle').style.display='none';
  B.on=false;
  setMusic('ow');
 }
 await runEvolutions();
 saveGame();
 return result;

 async function endOfTurn(){
  await endTurnStatus(B.ally,mName(B.ally));
  await endTurnStatus(B.foe,'Foe '+mName(B.foe));
  if(B.foe.hp<=0)await foeFainted(opts);
 }
 async function foeTurn(){
  if(B.foe.hp<=0)return;
  const fm=aiPick(B.foe,B.ally);
  if(await preMove(B.foe,'Foe '+mName(B.foe))){
   fm.pp=Math.max(0,fm.pp-1);
   await applyMove(B.foe,B.ally,B.fSt,B.aSt,fm,'Foe '+mName(B.foe),mName(B.ally));
  }
 }
 async function foeFainted(opts){ // returns true if battle over
  sfx('faint');await fx('foespr','faintDrop',460,true);
  await bText('Foe '+mName(B.foe)+' fainted!');
  const parts=[...B.parts].filter(i=>G.party[i]&&G.party[i].hp>0);
  for(const i of parts)await gainXP(G.party[i],B.foe,opts.kind==='trainer',parts.length);
  refreshPanels();
  B.fi++;
  if(opts.kind==='trainer'&&B.fi<B.team.length){
   B.foe=B.team[B.fi];B.fSt={};G.seen[B.foe.sp]=1;
   setSprites();refreshPanels();
   await bText(opts.name+' sent out '+mName(B.foe)+'!');
   if(abilityOf(B.foe)==='Daunt'){B.aSt.atk=clamp((B.aSt.atk||0)-1,-6,6);await bText('Foe '+mName(B.foe)+'\u2019s Daunt lowered '+mName(B.ally)+'\u2019s Attack!')}
   return false;
  }
  result.win=true;
  if(opts.kind==='trainer'){
   await bText('You defeated '+opts.name+'!');
   if(opts.winText)await bText(opts.winText);
   G.money+=opts.prize||0;
   await bText('You got $'+(opts.prize||0)+' for winning!');
  }
  return true;
 }
 async function checkAllyFaint(){ // returns true if battle over (loss)
  if(B.ally.hp>0)return false;
  sfx('faint');await fx('allyspr','faintDrop',460,true);
  await bText(mName(B.ally)+' fainted!');
  if(partyAlive()){
   const si=await partyScreen(true,true);
   B.ally=G.party[si];B.aSt={};B.parts.add(si);
   setSprites();refreshPanels();
   await bText('Go, '+mName(B.ally)+'!');
   if(abilityOf(B.ally)==='Daunt'){B.fSt.atk=clamp((B.fSt.atk||0)-1,-6,6);await bText(mName(B.ally)+'\u2019s Daunt lowered the foe\u2019s Attack!')}
   return false;
  }
  await bText('You have no beasts left able to fight!');
  if(opts.noBlackout){result.win=false;return true}
  await bText('You blacked out and rushed to the nearest Beast Center...');
  G.money=Math.floor(G.money/2);
  G.party.forEach(healMon);
  G.map=G.lastHeal.map;G.x=G.lastHeal.x;G.y=G.lastHeal.y;G.facing='down';
  result.win=false;return true;
 }
}

function miniIcon(spId,shiny){const c=mkCanvas(24,24);const s=monSprite(spId,false,shiny);c.getContext('2d').drawImage(s,4,4,32,32,0,0,24,24);return c}

async function partyScreen(inBattle,forced){
 while(true){
  const items=G.party.map((m,i)=>({label:monLabel(m),sub:monSub(m),iconCanvas:miniIcon(m.sp,m.shiny),
   disabled:inBattle&&(m.hp<=0||m===B.ally)}));
  const i=await panelList(inBattle?'Choose a beast':'Your party',items,{noBack:forced});
  if(i<0)return -1;
  if(inBattle)return i;
  const m=G.party[i];
  const c=await panelList(mName(m),[
   {label:'Summary'},{label:'Move to front'},
   {label:m.held?'Take '+ITEMS[m.held].n:'Take item',disabled:!m.held}
  ]);
  if(c===2&&m.held){
   G.bag[m.held]=(G.bag[m.held]||0)+1;
   await showText('Took the '+ITEMS[m.held].n+' from '+mName(m)+'.');
   m.held=null;saveGame();continue;
  }
  if(c===0){
   const sp=SPECIES[m.sp],st=maxStats(m.sp,m.lv);

   await showText('Moves: '+m.moves.map(mv=>MOVES[mv.id].n+' ('+mv.pp+'/'+MOVES[mv.id].pp+')').join(', '));
   await showText(sp.dx);

 }

async function battleBag(){ // returns action or null
 const ids=Object.keys(G.bag).filter(k=>G.bag[k]>0);
 if(!ids.length){await bText('Your bag is empty!');return null}
 const i=await panelList('Bag',ids.map(id=>({label:ITEMS[id].n+' x'+G.bag[id],sub:ITEMS[id].d})));
 if(i<0)return null;
 const id=ids[i];const it=ITEMS[id];
 if(it.kind==='revive'){
  const fainted=G.party.map((m,j)=>({m,j})).filter(o=>o.m.hp<=0);
  if(!fainted.length){await bText('No fainted beasts to revive!');return null}
  const f=await panelList('Revive who?',fainted.map(o=>({label:monLabel(o.m),iconCanvas:miniIcon(o.m.sp,o.m.shiny)})));
  if(f<0)return null;
  const m=fainted[f].m;m.hp=Math.floor(mMax(m)/2);m.status=null;
  await bText(mName(m)+' was revived!');
  return{type:'item',id};
 }
 if(it.kind==='heal'&&B.ally.hp>=mMax(B.ally)){await bText('HP is already full!');return null}
 if(it.kind==='status'&&!B.ally.status){await bText('No status to cure!');return null}
 return{type:'item',id};
}
async function overworldBag(){
 while(true){
  const ids=Object.keys(G.bag).filter(k=>G.bag[k]>0);
  if(!ids.length){await showText('Your bag is empty.');return}
  const i=await panelList('Bag  \u2014  $'+G.money,ids.map(id=>({label:ITEMS[id].n+' x'+G.bag[id],sub:ITEMS[id].d})));
  if(i<0)return;
  const id=ids[i],it=ITEMS[id];
  if(it.kind==='ball'){await showText('Orbs can only be used in battle against wild beasts.');continue}
  if(it.kind==='held'){
   const t2=await panelList('Give to who?',G.party.map(m2=>({label:monLabel(m2),sub:m2.held?'Holding: '+ITEMS[m2.held].n:'Holding nothing',iconCanvas:miniIcon(m2.sp,m2.shiny)})));
   if(t2<0)continue;
   const m2=G.party[t2];
   if(m2.held)G.bag[m2.held]=(G.bag[m2.held]||0)+1;
   m2.held=id;G.bag[id]--;if(G.bag[id]<=0)delete G.bag[id];
   await showText(mName(m2)+' is now holding the '+it.n+'.');
   saveGame();continue;
  }
  const targets=G.party.map((m,j)=>({m,j})).filter(o=>it.kind==='revive'?o.m.hp<=0:o.m.hp>0);
  if(!targets.length){await showText('No valid target.');continue}
  const t=await panelList('Use on who?',targets.map(o=>({label:monLabel(o.m),sub:monSub(o.m),iconCanvas:miniIcon(o.m.sp,o.m.shiny)})));
  if(t<0)continue;
  const m=targets[t].m;
  if(it.kind==='heal'){if(m.hp>=mMax(m)){await showText('HP is already full!');continue}m.hp=Math.min(mMax(m),m.hp+it.hp)}
  if(it.kind==='status'){if(!m.status){await showText('No status to cure!');continue}m.status=null}
  if(it.kind==='revive'){m.hp=Math.floor(mMax(m)/2);m.status=null}
  G.bag[id]--;if(G.bag[id]<=0)delete G.bag[id];
  await showText('Used '+it.n+' on '+mName(m)+'.');
  saveGame();
 }
}

async function exportSave(){

let saveTimer=0;
async function saveGame(force){
 if(!G)return;
 G.playMs=G.playMs+(Date.now()-G.playStart);G.playStart=Date.now();
 const now=Date.now();
 if(!force&&now-saveTimer<1500)return; // debounce
 saveTimer=now;
 try{
  if(window.storage)await window.storage.set('veridia-save',JSON.stringify(G));
  else localStorage.setItem('veridia-save',JSON.stringify(G));
 }catch(e){console.warn('save failed',e)}
}
async function loadSave(){
 try{
  if(window.storage){const r=await window.storage.get('veridia-save');return r&&r.value?JSON.parse(r.value):null}
  const s=localStorage.getItem('veridia-save');return s?JSON.parse(s):null;
 }catch(e){return null}
}

/* ----- input ----- */
function wireInput(){
 window.addEventListener('contextmenu',e=>e.preventDefault());
 document.addEventListener('selectstart',e=>{const tg=e.target&&e.target.tagName;if(tg!=='INPUT'&&tg!=='TEXTAREA')e.preventDefault()});
 document.addEventListener('dragstart',e=>e.preventDefault());
 const keymap={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right'};
 window.addEventListener('keydown',e=>{
  if(keymap[e.key]){e.preventDefault();input.held[keymap[e.key]]=1;input.dir=keymap[e.key]}
  if(e.key==='x'||e.key==='X'){if(ABTN.onB){e.preventDefault();ABTN.onB();return}}
  if(e.key==='Shift'||e.key==='x'||e.key==='X')input.run=true;
  if((e.key==='z'||e.key==='Z')&&!busy)interact();
  if(e.key==='Enter'&&!busy&&G)startMenu();
 });
 window.addEventListener('keyup',e=>{
  if(e.key==='Shift'||e.key==='x'||e.key==='X')input.run=false;
  if(keymap[e.key]){delete input.held[keymap[e.key]];
   input.dir=Object.keys(input.held)[0]||null}
 });
 document.querySelectorAll('.dbtn').forEach(b=>{
  const d=b.dataset.dir;
  const on=e=>{e.preventDefault();input.dir=d;b.classList.add('on')};
  const off=e=>{e.preventDefault();if(input.dir===d)input.dir=null;b.classList.remove('on')};
  b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);
  b.addEventListener('pointerleave',off);b.addEventListener('pointercancel',off);
 });
 document.getElementById('btnA').addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(ABTN.onA)ABTN.onA();else if(!busy)interact();
 });
 const bb=document.getElementById('btnB');
 bb.addEventListener('pointerdown',e=>{e.preventDefault();if(ABTN.onB){ABTN.onB();return}input.run=true});
 const bOff=e=>{input.run=false};
 bb.addEventListener('pointerup',bOff);bb.addEventListener('pointerleave',bOff);bb.addEventListener('pointercancel',bOff);
 document.getElementById('btnStart').addEventListener('pointerdown',e=>{
  e.preventDefault();if(!busy&&G)startMenu();
 });
}

/* ----- data validation (node) ----- */
function validateData(){
 for(let i=1;i<SPECIES.length;i++){
  const s=SPECIES[i];
  for(const[lv,id]of s.ls)if(!MOVES[id])throw new Error(s.n+' bad move '+id);
  if(s.ev&&!SPECIES[s.ev[0]])throw new Error(s.n+' bad evo');
 }
 const teams=[].concat(GYMS.map(g=>g.team),ELITE.map(e=>e.team),[CHAMPION.team],[rivalTeam(0,1),rivalTeam(1,4),rivalTeam(2,7),rivalTeam(3,1)]);
 for(const t of teams)for(const[sp,lv]of t)if(!SPECIES[sp])throw new Error('bad team species '+sp);
 buildWorld();
 for(const id in WORLD){
  const m=WORLD[id];
  for(const k in m.warps){const w=m.warps[k];const tgt=w.to||w.out;if(!WORLD[tgt])throw new Error(id+' bad warp '+tgt)}
  for(const side in m.exits){if(m.exits[side]&&!WORLD[m.exits[side]])throw new Error(id+' bad exit '+m.exits[side])}
  if(m.enc)for(const e of m.enc)if(!SPECIES[e[0]])throw new Error(id+' bad encounter '+e[0]);
  for(const n of m.npcs){
   if(n.trainer)for(const[sp]of n.trainer.team)if(!SPECIES[sp])throw new Error(id+' bad trainer species '+sp);
   if(n.kind==='item'&&!ITEMS[n.item])throw new Error(id+' bad item '+n.item);
   if(n.kind==='legend'&&!SPECIES[n.leg.sp])throw new Error(id+' bad legend '+n.leg.sp);
  }
 }
 return true;
}

/* ============================================================
   V2 EXPANSION — BIOME GENERATOR & NEW WORLD
   ============================================================ */
function makeBiome(id,seed,cfg){
 const W2=15,H=34,rng=mulberry32(3000+seed);
 const K={
  forest:{base:'.',wall:'T',patch:'G',deco:[['T',26],[',',10],['R',3]],ground:'.'},
  cave:{cave:true,ground:'c'},
  marsh:{base:'m',wall:'T',patch:'h',deco:[['Y',10],['W',8],['R',4]],ground:'m'},
  desert:{base:'s',wall:'d',patch:'u',deco:[['d',10],['R',5],['Y',3]],ground:'s'},
  coast:{base:'s',wall:'T',patch:'w',deco:[['R',5]],coast:true,ground:'s'},
  snow:{base:'i',wall:'J',patch:'n',deco:[['J',14],['R',5]],ground:'i'},
  volcano:{base:'v',wall:'k',patch:'v',deco:[['l',10],['R',6],['q',4]],ground:'v'}
 }[cfg.kind];
 let g;const pathX=[];
 if(K.cave){
  g=blank(W2,H,'k');
  let x=7;
  for(let y=H-1;y>=0;y--){
   pathX[y]=x;
   for(let i=-1;i<=1;i++){const xx=x+i;if(xx>0&&xx<W2-1)g[y][xx]='c'}
   if(y%3===0&&y>2&&y<H-3)x=clamp(x+rint(rng,-1,1),3,W2-4);
  }
  for(let r2=0;r2<4;r2++){
   const ry=rint(rng,4,H-7);const rx=clamp(pathX[ry]+pick(rng,[-4,4]),1,W2-5);
   for(let j=ry;j<ry+3;j++)for(let i=rx;i<rx+4;i++)if(j>0&&j<H-1&&i>0&&i<W2-1)g[j][i]='c';
  }
  for(let i=0;i<14;i++){
   const cx2=rint(rng,1,W2-2),cy2=rint(rng,1,H-2);
   if(g[cy2][cx2]==='k'&&(g[cy2][cx2-1]==='c'||g[cy2][cx2+1]==='c'||(g[cy2-1]&&g[cy2-1][cx2]==='c')||(g[cy2+1]&&g[cy2+1][cx2]==='c')))g[cy2][cx2]='p';
  }
  for(let i=0;i<6;i++){
   const cx2=rint(rng,2,W2-3),cy2=rint(rng,2,H-3);
   if(g[cy2][cx2]==='c'&&Math.abs(cx2-pathX[cy2])>1)g[cy2][cx2]='R';
  }
 }else{
  g=blank(W2,H,K.base);
  rect(g,0,0,1,H,K.wall);rect(g,W2-1,0,1,H,K.wall);
  if(K.coast){rect(g,0,0,2,H,'W');rect(g,2,0,2,H,'w')}
  let x=8;
  for(let y=H-1;y>=0;y--){
   pathX[y]=x;g[y][x]=K.base;if(x>1)g[y][x-1]=K.base;
   if(y%3===0&&y>2&&y<H-3)x=clamp(x+rint(rng,-1,1),K.coast?5:3,W2-4);
  }
  for(let i=0;i<8;i++){
   const gx=rint(rng,K.coast?4:2,W2-5),gy=rint(rng,2,H-6),gw=rint(rng,2,4),gh=rint(rng,2,3);
   for(let j=gy;j<gy+gh;j++)for(let k2=gx;k2<gx+gw;k2++)if(g[j]&&g[j][k2]===K.base)g[j][k2]=K.patch;
  }
  for(const fy of[12,23]){
   for(let j=fy;j<fy+2;j++)for(let k2=1;k2<W2-1;k2++)if(!SOLID[g[j][k2]]&&g[j][k2]!=='W')g[j][k2]=K.patch;
  }
  for(const[ch,n]of K.deco)for(let i=0;i<n;i++){
   const dx2=rint(rng,K.coast?4:2,W2-3),dy2=rint(rng,2,H-3);
   if(g[dy2][dx2]===K.base&&Math.abs(dx2-pathX[dy2])>1)g[dy2][dx2]=ch;
  }
 }
 // exits
 const tpx=pathX[2]!==undefined?pathX[2]:7,bpx=pathX[H-3]!==undefined?pathX[H-3]:7;
 if(cfg.n){for(const row of[0,1])for(let i=-1;i<=1;i++){const xx=clamp(tpx+i,1,W2-2);g[row][xx]=K.cave?'c':K.base}}
 else rect(g,0,0,W2,1,K.cave?'k':K.wall);
 if(cfg.s){for(const row of[H-1,H-2])for(let i=-1;i<=1;i++){const xx=clamp(bpx+i,1,W2-2);g[row][xx]=K.cave?'c':K.base}}
 else rect(g,0,H-1,W2,1,K.cave?'k':K.wall);
 const m={id,grid:g,name:cfg.name,enc:cfg.enc,npcs:[],warps:{},exits:{n:cfg.n,s:cfg.s},signs:{},ground:K.ground};
 // sign
 const sy=H-3,sx=clamp(pathX[sy]+2,1,W2-2);
 g[sy][sx]='S';m.signs[wk(sx,sy)]=cfg.name;
 // trainers beside the corridor
 (cfg.trainers||[]).forEach((tr,i,arr)=>{
  const at=tr.at!==undefined?tr.at:(arr.length===1?0.5:0.3+i*(0.45/(arr.length-1)));
  const ty=clamp(Math.floor(H*at),2,H-3);const px=pathX[ty];
  const side=(i%2===0)?1:-1;const tx=clamp(px+2*side,1,W2-2);
  g[ty][tx]=K.cave?'c':K.base;
  const mid=clamp(px+side,1,W2-2);
  if(SOLID[g[ty][mid]])g[ty][mid]=K.cave?'c':K.base;
  m.npcs.push({x:tx,y:ty,kind:'trainer',pal:tr.pal??2,face:side===1?'left':'right',range:3,trainer:tr});
 });
 // field items
 (cfg.items||[]).forEach((it,i)=>{
  const ty=clamp(Math.floor(H*it[1]),2,H-3);const px=pathX[ty];
  const side=(i%2===0)?-2:2;const tx=clamp(px+side,1,W2-2);
  g[ty][tx]=K.cave?'c':K.base;
  const mid=clamp(px+(side>0?1:-1),1,W2-2);
  if(SOLID[g[ty][mid]])g[ty][mid]=K.cave?'c':K.base;
  m.npcs.push({kind:'item',x:tx,y:ty,item:it[0],flag:'itm_'+id+'_'+i});
 });
 (cfg.extras||[]).forEach(n=>{
  if(n.at!==undefined){const ty=clamp(Math.floor(H*n.at),2,H-3);n.x=pathX[ty];n.y=ty;}
  m.npcs.push(n);
 });
 return finishMap(m);
}

 /* home town */
 (function(){
  const g=blank(17,13,'.');
  rect(g,0,0,17,1,'T');rect(g,0,12,17,1,'T');rect(g,0,0,1,13,'T');rect(g,16,0,1,13,'T');
